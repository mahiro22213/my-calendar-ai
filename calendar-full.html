<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整日历</title>
    <style>
        /* ---------- 基础样式 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --text-color: #ffffff;
            --font-size-base: 16px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .window-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                var(--gradient-angle, 145deg),
                var(--gradient-start, rgba(168, 237, 224, 0.5)),
                var(--gradient-end, rgba(254, 214, 227, 0.5))
            );
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            clip-path: inset(0 round 32px);
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .title-bar {
            height: 35px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            -webkit-app-region: drag;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .left-section, .center-section, .right-section {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .left-section {
            flex: 1;
            justify-content: flex-start;
        }

        .center-section {
            flex: 0 0 auto;
            justify-content: center;
            position: relative;
        }

        .right-section {
            flex: 1;
            justify-content: flex-end;
        }

        .date-navigation {
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .year-month-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .year-box, .month-box {
            position: relative;
            width: 40px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .year-box {
            border-radius: 12px 0 0 12px;
            border-right: none;
        }

        .month-box {
            border-radius: 0 12px 12px 0;
        }

        .display-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
        }

        .edit-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-size: 12px;
            text-align: center;
            outline: none;
            border-radius: inherit;
            display: none;
        }

        .grid-panel {
            position: absolute;
            top: 28px;
            left: 0;
            width: 260px;
            background: rgba(28,28,30,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            display: none;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transform-origin: top center;
            animation: panelAppear 0.2s ease-out;
        }

        @keyframes panelAppear {
            0% { opacity: 0; transform: scaleY(0.8); }
            100% { opacity: 1; transform: scaleY(1); }
        }

        .month-year-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .month-year-nav button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 16px;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .month-year-nav button:hover {
            background: rgba(255,255,255,0.3);
        }

        .month-year-nav .current-year {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
        }

        .month-year-nav .current-year:hover {
            background: rgba(255,255,255,0.2);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .grid-item {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 0;
            text-align: center;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        .grid-item:hover {
            background: rgba(255,255,255,0.3);
        }

        .nav-buttons {
            display: flex;
            gap: 4px;
        }

        .nav-buttons button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .nav-buttons button:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 标题栏按钮样式 */
        .ai-button {
            background: linear-gradient(145deg, #a8ede0, #fed6e3);
            border: none;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-app-region: no-drag;
            margin: 0 2px;
        }
        .ai-button:hover {
            opacity: 0.8;
        }
        .ai-button.normal {
            background: white;
            color: #333;
        }

        .sub-buttons {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 6px 12px;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 8px;
        }
        .sub-button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .sub-button:hover {
            background: rgba(255,255,255,0.4);
        }

        .right-buttons {
            display: flex;
            gap: 4px;
            -webkit-app-region: no-drag;
        }

        .right-buttons button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 4px;
        }

        .right-buttons button:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 标题栏天气区域 */
        .weather-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 8px;
            -webkit-app-region: no-drag;
        }
        .weather-header span {
            font-size: 14px;
            color: #fff;
        }
        .weather-detail-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .weather-detail-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .main-content {
            flex: 1;
            display: flex;
            padding: 24px;
            gap: 24px;
            min-height: 0;
        }

        .calendar-container {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: var(--font-size-base);
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 1fr;
            gap: 6px;
            flex: 1;
        }

        .day-cell {
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            min-height: 0;
            padding: 1px 0;
            border-radius: 4px;
            transition: color 0.2s;
            position: relative;
        }

        .day-cell:hover {
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .day-cell.today {
            background: #007acc !important;
            box-shadow: 0 0 8px rgba(0,122,204,0.5);
            color: #fff;
        }

        .day-cell.selected {
            outline: 2px solid #fff;
            outline-offset: 2px;
            background: rgba(255,255,255,0.1);
        }

        .day-cell.other-month {
            opacity: 0.4;
        }

        .solar {
            font-size: calc(var(--font-size-base) * 0.9);
            font-weight: 500;
            color: inherit;
            line-height: 1.2;
        }

        .lunar {
            font-size: calc(var(--font-size-base) * 0.6);
            color: inherit;
            opacity: 0.7;
            margin-top: 2px;
            line-height: 1.2;
        }

        .lunar.festival {
            color: #007acc;
            opacity: 1;
            font-weight: 500;
        }

        .todo-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 1px 4px;
            font-size: 10px;
            color: #fff;
            transition: background 0.2s;
        }
        .todo-count.red {
            background: #ff4444;
            color: white;
        }
        .todo-count.pink {
            background: #ff88aa;
            color: white;
        }

        .empty-cell {
            background: transparent;
            cursor: default;
        }
        .empty-cell:hover {
            background: transparent;
            color: inherit;
        }

        /* ---------- 右侧面板 ---------- */
        .info-panel {
            flex: 1;
            background: rgba(28,28,30,0.5);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
            color: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        /* 所有容器的公共样式 */
        .info-container, .ai-chat-container, .weather-detail-container,
        .memo-container, .global-ideas-container, .trash-container,
        .all-todos-container {
            flex: 1;
            overflow-y: auto;
        }

        .info-container {
            display: none;
        }

        .ai-chat-container {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .weather-detail-container {
            display: none;
        }

        .memo-container, .global-ideas-container, .trash-container,
        .all-todos-container {
            display: none;
            flex-direction: column;
            padding: 0;
        }

        /* 自定义滚动条 */
        .info-panel::-webkit-scrollbar,
        .chat-history::-webkit-scrollbar,
        .weather-detail-container::-webkit-scrollbar,
        .memo-container::-webkit-scrollbar,
        .global-ideas-container::-webkit-scrollbar,
        .trash-container::-webkit-scrollbar,
        .all-todos-container::-webkit-scrollbar {
            width: 6px;
        }
        .info-panel::-webkit-scrollbar-track,
        .chat-history::-webkit-scrollbar-track,
        .weather-detail-container::-webkit-scrollbar-track,
        .memo-container::-webkit-scrollbar-track,
        .global-ideas-container::-webkit-scrollbar-track,
        .trash-container::-webkit-scrollbar-track,
        .all-todos-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .info-panel::-webkit-scrollbar-thumb,
        .chat-history::-webkit-scrollbar-thumb,
        .weather-detail-container::-webkit-scrollbar-thumb,
        .memo-container::-webkit-scrollbar-thumb,
        .global-ideas-container::-webkit-scrollbar-thumb,
        .trash-container::-webkit-scrollbar-thumb,
        .all-todos-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .info-panel::-webkit-scrollbar-thumb:hover,
        .chat-history::-webkit-scrollbar-thumb:hover,
        .weather-detail-container::-webkit-scrollbar-thumb:hover,
        .memo-container::-webkit-scrollbar-thumb:hover,
        .global-ideas-container::-webkit-scrollbar-thumb:hover,
        .trash-container::-webkit-scrollbar-thumb:hover,
        .all-todos-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 原有信息容器内的样式 */
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .date-title {
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            flex: 1;
        }
        .edit-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }
        .edit-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .edit-input-field {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 14px;
            margin: 2px 0;
            outline: none;
        }

        .info-item {
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.5;
        }
        .info-label {
            color: #aaa;
            font-size: 13px;
            margin-right: 8px;
        }
        .info-value {
            font-weight: 500;
        }

        /* AI聊天样式 */
        .mode-indicator {
            text-align: center;
            font-size: 14px;
            padding: 6px 0;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            margin-bottom: 10px;
            color: #fff;
            opacity: 0.8;
            font-weight: 500;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding-left: 15px;
            padding-right: 15px;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        .message-wrapper {
            position: relative;
            max-width: 85%;
            margin-bottom: 12px;
            align-self: var(--align, flex-start);
        }

        .user-message-wrapper {
            --align: flex-end;
            margin-left: auto;
        }

        .assistant-message-wrapper {
            --align: flex-start;
            margin-right: auto;
        }

        .message {
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            background: var(--msg-bg);
            color: var(--msg-color);
            border-bottom-left-radius: var(--radius-bl);
            border-bottom-right-radius: var(--radius-br);
            position: relative;
            padding-right: 55px;
        }

        .user-message {
            --msg-bg: rgba(0,122,204,0.7);
            --msg-color: white;
            --radius-bl: 16px;
            --radius-br: 4px;
        }

        .assistant-message {
            --msg-bg: rgba(255,255,255,0.2);
            --msg-color: #eee;
            --radius-bl: 4px;
            --radius-br: 16px;
        }

        .message p { margin: 0 0 6px 0; }
        .message ul, .message ol { margin-left: 20px; margin-top: 4px; margin-bottom: 4px; }
        .message li { margin-bottom: 2px; }
        .message hr { border: 0.5px solid rgba(255,255,255,0.2); margin: 8px 0; }

        .message-actions {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 8px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message-wrapper:hover .message-actions {
            opacity: 1;
        }
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            padding: 2px 6px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .action-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .preset-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preset-button {
            background: linear-gradient(145deg, #a8ede0, #fed6e3);
            border: none;
            color: #333;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            flex: 1;
            min-width: 80px;
        }
        .preset-button.normal {
            background: white;
            color: #333;
        }
        .preset-button:hover {
            opacity: 0.8;
        }

        .input-area {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 5px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 8px 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-input::placeholder {
            color: #aaa;
        }

        .send-button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .send-button:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 详细天气样式 */
        .current-weather {
            margin: 15px 0;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .temp-big {
            font-size: 24px;
            font-weight: 600;
        }
        .weather-text {
            font-size: 16px;
            color: #ccc;
        }
        .hourly-title {
            font-size: 16px;
            font-weight: 500;
            margin: 10px 0 5px;
        }
        .hourly-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .hourly-table th {
            text-align: left;
            color: #aaa;
            padding: 4px 0;
        }
        .hourly-table td {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 13px;
        }
        .simple-weather {
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            line-height: 2;
        }

        /* ---------- 三个容器的公用头部样式 ---------- */
        .inspiration-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .inspiration-header .date-display {
            font-size: 14px;
            color: #ccc;
        }
        .add-idea-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 18px;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .add-idea-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        .idea-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .idea-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .idea-card:hover {
            background: rgba(255,255,255,0.2);
        }
        .idea-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .idea-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 2px;
        }
        .idea-detail-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .idea-content {
            font-size: 14px;
            font-weight: 500;
        }
        .status-badge {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
        }
        .idea-details {
            font-size: 12px;
            color: #ccc;
            margin-top: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .idea-details span {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .idea-date {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        .idea-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 6px;
        }

            if (phase < 0.75) return '亏凸月';
            if (phase < 0.875) return '下弦月';
            return '残月';
        }

        function getFestivalString(lunarInfo) {
            const festivals = [];
            if (lunarInfo.festival) festivals.push(lunarInfo.festival);
            if (lunarInfo.solarFestival) festivals.push(lunarInfo.solarFestival);
            return festivals.join('、') || '无';
        }

        function getWeekNumber(d) {
            const firstDay = new Date(d.getFullYear(), 0, 1);
            const pastDays = (d - firstDay) / 86400000;
            return Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
        }

        function getDayOfYear(d) {
            const start = new Date(d.getFullYear(), 0, 0);
            const diff = d - start;
            return Math.floor(diff / (1000*60*60*24));
        }

        function getConstellation(month, day) {
            const md = month * 100 + day;
            if (md >= 321 && md <= 419) return '白羊座';
            if (md >= 420 && md <= 520) return '金牛座';
            if (md >= 521 && md <= 621) return '双子座';
            if (md >= 622 && md <= 722) return '巨蟹座';
            if (md >= 723 && md <= 822) return '狮子座';
            if (md >= 823 && md <= 922) return '处女座';
            if (md >= 923 && md <= 1023) return '天秤座';
            if (md >= 1024 && md <= 1122) return '天蝎座';
            if (md >= 1123 && md <= 1221) return '射手座';
            if (md >= 1222 || md <= 119) return '摩羯座';
            if (md >= 120 && md <= 218) return '水瓶座';
            return '双鱼座';
        }

        // ---------- 天气渲染函数 ----------
        function renderTodayWeatherFromCache(data) {
            const [now, hourly, air, uv, sun] = data;
            if (now) {
                ipcRenderer.send('update-weather-for-main', { temp: now.temp, text: now.text, feelsLike: now.feelsLike });
                updateHeaderWeather(now);
            }

            let html = '';
            if (now) {
                html += `<div class="current-weather">`;

                html += `<div class="weather-text">${now.text} 体感 ${now.feelsLike}°C</div>`;
                html += `</div>`;
            }

            if (hourly && hourly.length) {
                html += `<div class="hourly-title">⏰ 逐小时预报</div>`;
                html += `<table class="hourly-table"><tr><th>时间</th><th>天气</th><th>温度</th><th>降水</th><th>风速</th></tr>`;
                const maxItems = 16;
                for (let i = 0; i < Math.min(hourly.length, maxItems); i += 2) {
                    const h = hourly[i];
                    const hour = new Date(h.fxTime).getHours().toString().padStart(2,'0') + ':00';
                    html += `<tr><td>${hour}</td><td>${h.text}</td><td>${h.temp}°C</td><td>${h.precip}mm</td><td>${h.windSpeed}km/h</td></tr>`;
                }
                html += `</table>`;
            }

            html += `<div class="detail-grid">`;
            if (now) {
                html += `<div>💧 湿度 ${now.humidity}%</div>`;
                html += `<div>📊 气压 ${now.pressure}hPa</div>`;
                html += `<div>🧭 风向 ${now.windDir}</div>`;
                html += `<div>☔ 降水 ${now.precip}mm</div>`;
                html += `<div>👁️ 能见度 ${now.vis}km</div>`;
            }
            if (air) html += `<div>🌫️ AQI ${air.aqi} (${air.category})</div>`;
            if (uv) html += `<div>☀️ 紫外线 ${uv.level} (${uv.category})</div>`;
            if (sun) {
                html += `<div>🌅 日出 ${sun.sunrise}</div>`;
                html += `<div>🌇 日落 ${sun.sunset}</div>`;
            }
            html += `</div>`;

            weatherNow.innerHTML = html;
            hourlyTable.innerHTML = '';
            otherInfo.innerHTML = '';
        }

        async function renderTodayWeather(year, month, day) {
            const key = `${year}-${month}-${day}`;

                ipcRenderer.invoke('weather-24h'),

                ipcRenderer.invoke('indices-uv'),

            weatherCache.set(key, data);

        async function renderOtherDayWeather(year, month, day) {

                renderOtherDayWeatherFromCache(weatherCache.get(key));

            if (!daily) return;
            const target = `${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;

        // ---------- 操作处理 ----------
        async function handleMemoProgress(idea, dateStr) {
            if (idea.status === 'PROGRESSED') {
                idea.status = idea.prevStatus || 'NEW';
                delete idea.prevStatus;
            } else {
                idea.prevStatus = idea.status;
                idea.status = 'PROGRESSED';
            }

        // ---------- 日历格子计数及颜色 ----------
        async function updateTodoCountForDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            const cells = document.querySelectorAll('.day-cell');
            for (let cell of cells) {
                const y = cell.dataset.year;
                const m = cell.dataset.month;
                const d = cell.dataset.day;
                if (y == year && m == month && d == day) {
                    const ideas = await ipcRenderer.invoke('load-ideas-for-date', dateStr) || [];
                    // 只统计未完成的待办（排除 TRASH 和 PROGRESSED）
                    const nonTrash = ideas.filter(i => i.status !== 'TRASH' && i.status !== 'PROGRESSED');
                    const count = nonTrash.length;
                    const countSpan = cell.querySelector('.todo-count');
                    if (countSpan) {
                        countSpan.textContent = count > 0 ? count : '';
                        const todayStr = new Date().toISOString().split('T')[0];
                        const todayDate = new Date(todayStr);
                        const targetDate = new Date(dateStr);
                        const diffDays = Math.round((targetDate - todayDate) / (1000*60*60*24));
                        if (diffDays === 0) {
                            countSpan.className = 'todo-count red';
                        } else if (diffDays >= 1 && diffDays <= 3) {
                            countSpan.className = 'todo-count pink';
                        } else {
                            countSpan.className = 'todo-count';
                        }
                    }
                    break;
                }
            }
        }

        async function refreshAllTodoCounts() {
            const cells = document.querySelectorAll('.day-cell');
            for (let cell of cells) {
                const y = cell.dataset.year;
                const m = cell.dataset.month;
                const d = cell.dataset.day;
                if (y && m && d) {
                    const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    await updateTodoCountForDate(ds);
                }
            }
        }

        // ---------- 显示日期信息 ----------
        async function showDateInfo(year, month, day) {
            setRightMode(Mode.MEMO);
            currentYear = year;
            currentMonth = month;
            currentDate = day;

            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));

            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const dateObj = new Date(year, month-1, day);
            const weekday = weekdays[dateObj.getDay()];
            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            infoDateTitle.textContent = `${dateStr} ${weekday}`;

            const lunarInfo = LunarCalendar.solarToLunar(year, month, day);
            let lunarGanzhi = (lunarInfo.lunarMonthName || '') + (lunarInfo.lunarDayName || '') + ' ' + (lunarInfo.lunarYearName || '') + (lunarInfo.zodiac ? '(' + lunarInfo.zodiac + ')' : '');
            let weekDayStr = `第${getWeekNumber(dateObj)}周 · 第${getDayOfYear(dateObj)}天`;
            let constellation = getConstellation(month, day);
            let festival = getFestivalString(lunarInfo);

            const custom = customDateInfo[dateStr];
            if (custom) {
                if (custom.lunar) lunarGanzhi = custom.lunar;
                if (custom.weekDay) weekDayStr = custom.weekDay;
                if (custom.constellation) constellation = custom.constellation;
                if (custom.festival) festival = custom.festival;
            }

            infoLunarGanzhi.textContent = lunarGanzhi;
            infoWeekDay.textContent = weekDayStr;
            infoConstellation.textContent = constellation;
            infoFestival.textContent = festival;

            if (editMode) exitEditMode();

            loadMemoForDate(dateStr);

            const isToday = (year === today.getFullYear() && month === today.getMonth()+1 && day === today.getDate());
            if (isToday) {
                await renderTodayWeather(year, month, day);
            } else {
                await renderOtherDayWeather(year, month, day);
            }

        // ---------- 日历格子生成 ----------
        function createDayCell(year, month, day, isCurrentMonth) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (!isCurrentMonth) cell.classList.add('other-month');

            cell.dataset.year = year;
            cell.dataset.month = month;
            cell.dataset.day = day;

            const solarDiv = document.createElement('div');
            solarDiv.className = 'solar';
            solarDiv.textContent = day;
            cell.appendChild(solarDiv);

            const lunarInfo = LunarCalendar.solarToLunar(year, month, day);
            let lunarText = lunarInfo.lunarDayName;
            let isFestival = false;

            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const custom = customDateInfo[dateStr];
            if (custom && custom.festival) {
                lunarText = custom.festival.split(/[、,，\s]+/)[0];
                if (isCurrentMonth) isFestival = true;
            } else {
                if (lunarInfo.festival) {
                    const parts = lunarInfo.festival.split(/[、,，\s]+/);
                    lunarText = parts[0];
                    if (isCurrentMonth) isFestival = true;
                } else if (lunarInfo.solarFestival) {
                    const parts = lunarInfo.solarFestival.split(/[、,，\s]+/);
                    lunarText = parts[0];
                    if (isCurrentMonth) isFestival = true;
                }
            }

            const lunarDiv = document.createElement('div');
            lunarDiv.className = 'lunar' + (isFestival ? ' festival' : '');
            lunarDiv.textContent = lunarText;
            cell.appendChild(lunarDiv);

            // 待办计数
            const countSpan = document.createElement('span');
            countSpan.className = 'todo-count';
            cell.appendChild(countSpan);

            if (isCurrentMonth && year === today.getFullYear() && month === today.getMonth()+1 && day === today.getDate()) {
                cell.classList.add('today');
            }

            cell.addEventListener('click', (e) => {
                document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                cell.classList.add('selected');
                showDateInfo(year, month, day);
            });

            // 异步加载计数
            (async () => {
                await updateTodoCountForDate(dateStr);
            })();

            return cell;
        }

        function generateFullCalendar(year, month) {
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            const firstDay = new Date(year, month - 1, 1).getDay();
            let leadingEmpty = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month, 0).getDate();

            const prevMonthDate = new Date(year, month - 1, 0);
            const prevMonthYear = prevMonthDate.getFullYear();
            const prevMonth = prevMonthDate.getMonth() + 1;
            const prevMonthDays = prevMonthDate.getDate();

            for (let i = 0; i < leadingEmpty; i++) {
                const day = prevMonthDays - leadingEmpty + i + 1;
                grid.appendChild(createDayCell(prevMonthYear, prevMonth, day, false));
            }

            for (let d = 1; d <= daysInMonth; d++) {
                grid.appendChild(createDayCell(year, month, d, true));
            }

            const totalCells = Math.ceil((daysInMonth + leadingEmpty) / 7) * 7;
            const trailingEmpty = totalCells - (leadingEmpty + daysInMonth);
            const nextMonthDate = new Date(year, month, 1);
            const nextMonthYear = nextMonthDate.getFullYear();
            const nextMonth = nextMonthDate.getMonth() + 1;

            for (let i = 0; i < trailingEmpty; i++) {
                const day = i + 1;
                grid.appendChild(createDayCell(nextMonthYear, nextMonth, day, false));
            }
        }

        function renderCalendar() {
            generateFullCalendar(currentYear, currentMonth);

        // ---------- 面板构建（年月选择等）----------
        function buildYearPanel(baseYear) {
            yearGrid.innerHTML = '';
            const startYear = baseYear - 6;
            for (let i = 0; i < 12; i++) {
                const y = startYear + i;
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.textContent = y;
                item.addEventListener('click', () => {
                    if (yearPanel.style.display === 'block' && monthPanel.style.display === 'none') {
                        monthPanelYear = y;
                        updateMonthPanelYear();
                        hideAllPanels();
                        monthPanel.style.display = 'block';
                    } else {
                        currentYear = y;
                        renderCalendar();
                        hideAllPanels();
                    }
                });
                yearGrid.appendChild(item);
            }
        }

        function buildMonthPanel() {
            monthGrid.innerHTML = '';
            for (let m = 1; m <= 12; m++) {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.textContent = String(m).padStart(2, '0');
                item.addEventListener('click', () => {
                    currentYear = monthPanelYear;
                    currentMonth = m;
                    renderCalendar();
                    hideAllPanels();
                });
                monthGrid.appendChild(item);
            }
            monthPanelYearSpan.textContent = monthPanelYear;
        }

        function updateMonthPanelYear() {
            monthPanelYearSpan.textContent = monthPanelYear;
            buildMonthPanel();
        }

            monthPanel.style.display = 'none';
        }

            buildYearPanel(currentYear);
            yearPanel.style.display = 'block';
        }

        function showMonthPanel() {

            monthPanelYear = currentYear;

            monthPanel.style.display = 'block';

        // ---------- AI 对话相关 ----------
        function setSystemMessage(mode) {
            let prompt = systemPrompts[mode];
            const systemMsg = { role: 'system', content: prompt };
            const messages = modeMessages[mode];
            const filtered = messages.filter(msg => msg.role !== 'system');
            filtered.unshift(systemMsg);
            modeMessages[mode] = filtered;
        }

        function setMode(mode, displayName) {
            currentMode = mode;
            modeIndicator.textContent = displayName;
            setSystemMessage(mode);
            renderChat();
            divinationSubButtons.style.display = 'none';
        }

        function renderChat() {
            chatHistory.innerHTML = '';
            const messages = modeMessages[currentMode];
            messages.forEach(msg => {
                if (msg.role === 'system') return;
                if (!msg.id) msg.id = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role === 'user' ? 'user-message-wrapper' : 'assistant-message-wrapper'}`;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;
                msgDiv.textContent = msg.content;
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.textContent = '📋';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(msg.content).then(() => {
                        copyBtn.textContent = '✓';
                        setTimeout(() => copyBtn.textContent = '📋', 1000);
                    });
                };
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'action-btn';
                deleteBtn.textContent = '🗑️';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    const msgs = modeMessages[currentMode];
                    const index = msgs.findIndex(m => m.id === msg.id);
                    if (index !== -1) {
                        msgs.splice(index, 1);
                        renderChat();
                    }
                };
                actionsDiv.appendChild(copyBtn);
                actionsDiv.appendChild(deleteBtn);
                msgDiv.appendChild(actionsDiv);
                wrapper.appendChild(msgDiv);
                chatHistory.appendChild(wrapper);
            });
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendMessage(content) {
            if (!content.trim()) return;
            const messages = modeMessages[currentMode];
            messages.push({ role: 'user', content, id: Date.now() + '-' + Math.random().toString(36).substr(2, 9) });
            renderChat();
            chatInput.value = '';

            let messagesToSend = messages.slice();
            const MAX_HISTORY = 30;
            if (messagesToSend.length > MAX_HISTORY + 1) {
                const system = messagesToSend[0];
                const recent = messagesToSend.slice(-MAX_HISTORY);
                messagesToSend = [system, ...recent];
            }

            try {
                const reply = await ipcRenderer.invoke('ask-ai', messagesToSend);
                messages.push({ role: 'assistant', content: reply, id: Date.now() + '-' + Math.random().toString(36).substr(2, 9) });
            } catch (error) {
                const errorMsg = error.message || '未知错误';
                messages.push({ role: 'assistant', content: `发送失败: ${errorMsg}`, id: Date.now() + '-' + Math.random().toString(36).substr(2, 9) });
                console.error('AI 错误:', error);
            }
            renderChat();
        }
