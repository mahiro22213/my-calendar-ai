<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的日历 AI · 今日卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --text-color: #ffffff;
            --font-size-base: 16px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            -webkit-app-region: drag;
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 背景层 */
        .window-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                var(--gradient-angle, 145deg),
                var(--gradient-start, rgba(168, 237, 224, 0.5)),
                var(--gradient-end, rgba(254, 214, 227, 0.5))
            );
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            clip-path: inset(0 round 32px);
            pointer-events: none;
            z-index: 1;
        }

        .title-bar, .card {
            position: relative;
            z-index: 2;
        }

        .title-bar {
            height: 56px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-color);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            -webkit-app-region: drag;
        }

        .title-bar span, .title-bar .right-group {
            -webkit-app-region: no-drag;
        }

        .right-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todo-badge {
            background: #ff4444;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            display: none;
        }

        .weather-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .weather-header span {
            font-size: 14px;
            color: #fff;
        }

        .right-buttons {
            display: flex;
            gap: 4px;
        }
        .right-buttons button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 4px;
        }
        .right-buttons button:hover {
            background: rgba(255,255,255,0.2);
        }

        .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-app-region: no-drag;
        }

        .big-date {
            font-size: calc(var(--font-size-base) * 7.5);
            font-weight: 600;
            line-height: 1;
            color: var(--text-color);
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .big-date:hover {
            transform: scale(1.05);
        }

        .info-row {
            font-size: var(--font-size-base);
            color: var(--text-color);
            opacity: 0.8;
            margin: 8px 0;
            letter-spacing: 0.8px;
        }

        .lunar-row {
            font-size: calc(var(--font-size-base) * 1.2);
            font-weight: 400;
            color: var(--text-color);
            opacity: 0.7;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="window-bg"></div>

    <div class="title-bar" id="titleBar">
        <span id="yearMonth">2026年3月</span>
        <div class="right-group">
            <span class="todo-badge" id="todoBadge"></span>
            <div class="weather-header">
                <span id="mainWeatherTemp"></span>
                <span id="mainWeatherFeels"></span>
            </div>
            <div class="right-buttons" style="display: none;">
              <!-- 按钮已隐藏，但仍保留容器 -->
            </div>
        </div>
    </div>

    <div class="card">
        <div class="big-date" id="dayNumber">7</div>
        <div class="info-row" id="dayInfo">第66天 · 第10周</div>
        <div class="lunar-row" id="lunarWeek">正月十九 周六</div>
    </div>

    <script>
        // 辅助函数：十六进制转 rgba
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 日期计算
        function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        function getWeekNumber(date) {
            const firstDay = new Date(date.getFullYear(), 0, 1);
            const pastDays = (date - firstDay) / 86400000;
            return Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
        }

        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth() + 1;
        const day = today.getDate();
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const weekday = weekdays[today.getDay()];
        const dayOfYear = getDayOfYear(today);
        const weekOfYear = getWeekNumber(today);
        const lunarDisplay = '正月十九'; // 示例农历，后续可集成真实农历库

        document.getElementById('yearMonth').textContent = `${year}年${month}月`;
        document.getElementById('dayNumber').textContent = day;
        document.getElementById('dayInfo').textContent = `第${dayOfYear}天 · 第${weekOfYear}周`;
        document.getElementById('lunarWeek').textContent = `${lunarDisplay} ${weekday}`;

        // 右键关闭
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (window.electronAPI) {
                window.electronAPI.showContextMenu();
            }
        });

        // 点击大日期打开完整日历
        document.querySelector('.big-date').addEventListener('click', () => {
            if (window.electronAPI && window.electronAPI.openFullCalendar) {
                window.electronAPI.openFullCalendar();
            }
        });

        // 监听背景和文字样式更新
        if (window.electronAPI && window.electronAPI.onUpdateBg) {
            window.electronAPI.onUpdateBg((event, settings) => {
                const { startColor, endColor, angle, alpha, textColor, fontSize } = settings;
                document.documentElement.style.setProperty('--gradient-start', hexToRgba(startColor, alpha));
                document.documentElement.style.setProperty('--gradient-end', hexToRgba(endColor, alpha));
                document.documentElement.style.setProperty('--gradient-angle', angle + 'deg');
                document.documentElement.style.setProperty('--text-color', textColor);
                document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
            });
        }

        // 加载已保存的主窗口设置
        (async () => {
            if (window.electronAPI && window.electronAPI.loadSettings) {
                try {
                    const settings = await window.electronAPI.loadSettings();
                    if (settings && settings.main) {
                        const mainSettings = settings.main;
                        document.documentElement.style.setProperty('--gradient-start', hexToRgba(mainSettings.startColor, mainSettings.alpha));
                        document.documentElement.style.setProperty('--gradient-end', hexToRgba(mainSettings.endColor, mainSettings.alpha));
                        document.documentElement.style.setProperty('--gradient-angle', mainSettings.angle + 'deg');
                        document.documentElement.style.setProperty('--text-color', mainSettings.textColor);
                        document.documentElement.style.setProperty('--font-size-base', mainSettings.fontSize + 'px');
                    }
                } catch (e) {
                    console.error('加载主窗口设置失败', e);
                }
            }
        })();

        // 监听天气更新
        if (window.electronAPI && window.electronAPI.onMainWeatherUpdate) {
            window.electronAPI.onMainWeatherUpdate((data) => {
                const tempSpan = document.getElementById('mainWeatherTemp');
                const feelsSpan = document.getElementById('mainWeatherFeels');
                if (tempSpan && feelsSpan && data) {
                    tempSpan.textContent = `${data.temp}°C ${data.text}`;
                    feelsSpan.textContent = `体感 ${data.feelsLike}°C`;
                }
            });
        }

        // 获取今日待办并更新徽章
        async function updateTodoBadge() {
            if (!window.electronAPI || !window.electronAPI.getTodayTodos) return;
            try {
                const todos = await window.electronAPI.getTodayTodos();
                const badge = document.getElementById('todoBadge');
                if (todos.length > 0) {
                    badge.textContent = `📋 ${todos.length}`;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch (e) {
                console.error('获取今日待办失败', e);
            }
        }

        // 初始化时更新，并每分钟刷新一次（接受延迟）
        updateTodoBadge();
        setInterval(updateTodoBadge, 60000);

        // 打开设置窗口
        function openSettings() {
            if (window.electronAPI && window.electronAPI.openSettingsWindow) {
                window.electronAPI.openSettingsWindow();
            }
        }
    </script>
</body>
</html>
